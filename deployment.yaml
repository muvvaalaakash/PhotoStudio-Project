apiVersion: apps/v1
kind: Deployment
metadata: 
  name: photo-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: photo-app
  template: 
    metadata:
      labels: 
        app: photo-app
    spec:
      containers:
      - name: photo-app
        image: mvnsakash/photo-studio:latest
        ports:
        - containerport: 3000
        envFrom: 
        - configMapRef:
            name: photostudio-config
---
apiVersion: v1
kind: Service
metadata: 
  name: photo-service
spec: 
  selector:
    app: photo-app
  ports:
  - port: 3000
    targetport: 3000
  type: NodePort
