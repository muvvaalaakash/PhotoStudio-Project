apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
spec:
  replicas: 1   # IMPORTANT: keep 1 unless you know replica sets
  selector:
    matchLabels:
      app: mongodb
  template:
    metadata:
      labels:
        app: mongodb
    spec:
      containers:
      - name: mongodb
        image: mongo:7
        ports:
        - containerPort: 27017   # FIXED
---
apiVersion: v1
kind: Service
metadata:
  name: mongo   # MUST match your ConfigMap hostname
spec:
  selector:
    app: mongodb
  ports:
  - port: 27017
    targetPort: 27017
